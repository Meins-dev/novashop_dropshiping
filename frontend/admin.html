<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Panel — NEXUS</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .admin-container {
      max-width: 1200px;
      margin: 8rem auto 4rem;
      padding: 0 2rem;
    }
    .admin-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 3rem;
    }
    .product-table {
      width: 100%; border-collapse: collapse;
      background: var(--glass);
      border: 1px solid var(--glassborder);
      border-radius: 20px;
      overflow: hidden;
      backdrop-filter: blur(24px);
    }
    .product-table th, .product-table td {
      padding: 1.2rem; text-align: left;
      border-bottom: 1px solid var(--glassborder);
      font-size: .9rem;
    }
    .product-table th {
      background: rgba(139,92,246,0.1);
      color: var(--v5); font-family: var(--font-mono);
      text-transform: uppercase; font-size: .7rem;
    }
    .action-btns { display: flex; gap: .5rem; }
    .btn-sm {
      padding: .4rem .8rem; border-radius: 8px;
      font-size: .7rem; font-weight: 600; cursor: pointer;
      border: 1px solid var(--glassborder); background: var(--glass);
      color: var(--w); transition: all .2s;
    }
    .btn-sm:hover { border-color: var(--v3); background: rgba(139,92,246,0.1); }
    .btn-del:hover { border-color: #ef4444; color: #ef4444; }

    .modal {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
      display: none; place-items: center;
    }
    .modal.active { display: grid; }
    .modal-content {
      background: #0a0a0a; border: 1px solid var(--glassborder);
      border-radius: 24px; padding: 2.5rem;
      width: 100%; max-width: 500px;
      box-shadow: var(--glow);
    }
    .form-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem;
    }
    .form-group { display: flex; flex-direction: column; gap: .5rem; }
    .form-group.full { grid-column: span 2; }
    .form-group label { font-size: .7rem; color: var(--g3); font-family: var(--font-mono); }
    .form-group input, .form-group textarea, .form-group select {
      background: rgba(255,255,255,0.05); border: 1px solid var(--glassborder);
      padding: .8rem; border-radius: 10px; color: white; outline: none;
    }
    .form-group input:focus { border-color: var(--v3); }
  </style>
</head>
<body>
  <header id="header">
    <div class="logo">
      <div class="logo-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1L13 4V10L7 13L1 10V4L7 1Z" stroke="#A855F7" stroke-width="1.2" fill="rgba(168,85,247,.15)"/>
          <path d="M7 4V10M4 5.5L10 8.5" stroke="#A855F7" stroke-width="1"/>
        </svg>
      </div>
      NEXUS ADMIN
    </div>
    <nav>
      <a href="index.html">Voltar à Loja</a>
    </nav>
    <div class="header-actions">
      <a class="cta-sm" id="logout-btn">Sair</a>
    </div>
  </header>

  <main class="admin-container">
    <div class="admin-header">
      <h1>Gestão de <span style="background:linear-gradient(135deg,var(--v3),var(--v5));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Produtos</span></h1>
      <button class="btn-primary" onclick="openModal()">+ Novo Produto</button>
    </div>

    <table class="product-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Produto</th>
          <th>Categoria</th>
          <th>Preço</th>
          <th>Estoque</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="product-list">
        <!-- Products injected by JS -->
      </tbody>
    </table>
  </main>

  <div class="modal" id="productModal">
    <div class="modal-content">
      <h2 id="modalTitle" style="font-family: var(--font-display); margin-bottom: 1rem;">Adicionar Produto</h2>
      <form id="productForm">
        <input type="hidden" id="prodId">
        <div class="form-grid">
          <div class="form-group full">
            <label>Nome do Produto</label>
            <input type="text" id="name" required>
          </div>
          <div class="form-group full">
            <label>Descrição</label>
            <textarea id="description" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label>Preço (R$)</label>
            <input type="number" step="0.01" id="price" required>
          </div>
          <div class="form-group">
            <label>Preço Original (R$)</label>
            <input type="number" step="0.01" id="original_price">
          </div>
          <div class="form-group">
            <label>Categoria</label>
            <input type="text" id="category">
          </div>
          <div class="form-group">
            <label>Emoji</label>
            <input type="text" id="emoji">
          </div>
          <div class="form-group">
            <label>Estoque</label>
            <input type="number" id="stock" required>
          </div>
          <div class="form-group">
            <label>Avaliação (0-5)</label>
            <input type="number" step="0.1" id="rating">
          </div>
        </div>
        <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: flex-end;">
          <button type="button" class="btn-secondary" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="btn-primary">Salvar Produto</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('access_token');

    async function checkAdmin() {
      if (!token) { window.location.href = 'login.html'; return; }
      try {
        const res = await fetch('/api/me', { headers: { 'Authorization': `Bearer ${token}` } });
        const { user } = await res.json();
        if (!user.is_admin) {
          alert('Acesso negado: Você não é administrador.');
          window.location.href = 'index.html';
        }
      } catch (e) { window.location.href = 'login.html'; }
    }

    async function loadProducts() {
      const res = await fetch('/api/products');
      const { products } = await res.json();
      const list = document.getElementById('product-list');
      list.innerHTML = products.map(p => `
        <tr>
          <td>${p.id}</td>
          <td style="font-weight:600">${p.name}</td>
          <td style="font-family:var(--font-mono); font-size:.7rem">${p.category}</td>
          <td>R$ ${p.price.toFixed(2)}</td>
          <td>${p.stock}</td>
          <td class="action-btns">
            <button class="btn-sm" onclick="editProduct(${p.id})">Editar</button>
            <button class="btn-sm btn-del" onclick="deleteProduct(${p.id})">Excluir</button>
          </div>
        </tr>
      `).join('');
    }

    function openModal(id = null) {
      const modal = document.getElementById('productModal');
      const form = document.getElementById('productForm');
      form.reset();
      document.getElementById('prodId').value = id || '';
      document.getElementById('modalTitle').textContent = id ? 'Editar Produto' : 'Adicionar Produto';
      modal.classList.add('active');
    }

    function closeModal() {
      document.getElementById('productModal').classList.remove('active');
    }

    async function editProduct(id) {
      const res = await fetch(`/api/products/${id}`);
      const p = await res.json();

      document.getElementById('prodId').value = p.id;
      document.getElementById('name').value = p.name;
      document.getElementById('description').value = p.description;
      document.getElementById('price').value = p.price;
      document.getElementById('original_price').value = p.original_price || '';
      document.getElementById('category').value = p.category;
      document.getElementById('emoji').value = p.emoji;
      document.getElementById('stock').value = p.stock;
      document.getElementById('rating').value = p.rating;

      openModal(id);
    }

    async function deleteProduct(id) {
      if (!confirm('Tem certeza que deseja excluir este produto?')) return;
      await fetch(`/api/products/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      loadProducts();
    }

    document.getElementById('productForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('prodId').value;
      const data = {
        name: document.getElementById('name').value,
        description: document.getElementById('description').value,
        price: parseFloat(document.getElementById('price').value),
        original_price: parseFloat(document.getElementById('original_price').value) || null,
        category: document.getElementById('category').value,
        emoji: document.getElementById('emoji').value,
        stock: parseInt(document.getElementById('stock').value),
        rating: parseFloat(document.getElementById('rating').value) || 0,
      };

      const method = id ? 'PUT' : 'POST';
      const url = id ? `/api/products/${id}` : '/api/products';

      const res = await fetch(url, {
        method,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(data)
      });

      if (res.ok) {
        closeModal();
        loadProducts();
      } else {
        alert('Erro ao salvar produto.');
      }
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/api/logout', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      localStorage.clear();
      window.location.href = 'index.html';
    });

    checkAdmin().then(loadProducts);
  </script>
</body>
</html>
