<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Criar Conta - NEXUS</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .auth-wrap{max-width:700px;margin:5rem auto;padding:2rem;background:linear-gradient(135deg,rgba(17,17,17,.9),rgba(10,10,10,.95));border:1px solid rgba(255,255,255,.03);border-radius:16px}
    .auth-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:center}
    .auth-hero{padding:1rem}
    .auth-form{padding:1rem}
    form{display:grid;gap:.8rem}
    input,textarea{background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.04);padding:.75rem;border-radius:8px;color:var(--w)}
    .btn-primary{padding:.65rem 1rem;border-radius:10px;background:linear-gradient(135deg,var(--v2),var(--v));color:#fff;border:none;cursor:pointer}
    .muted{color:var(--g3);font-size:.92rem}
    @media(max-width:800px){.auth-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>

<!-- Header (same look as index) -->
<header id="header">
  <div class="logo">
    <div class="logo-icon">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1L13 4V10L7 13L1 10V4L7 1Z" stroke="#A855F7" stroke-width="1.2" fill="rgba(168,85,247,.15)"/>
        <path d="M7 4V10M4 5.5L10 8.5" stroke="#A855F7" stroke-width="1"/>
      </svg>
    </div>
    NEXUS
  </div>
  <nav>
    <a href="index.html">Produtos</a>
    <a href="index.html#destaques">Destaques</a>
    <a href="index.html#tecnologia">Tecnologia</a>
    <a href="about.html">Sobre</a>
  </nav>
  <div class="header-actions">
    <div class="search-bar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input placeholder="Buscar produtos..."></div>
    <a class="cart-btn" href="cart.html" role="button"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span class="cart-badge">0</span></a>
    <a class="cta-sm" href="login.html">Entrar</a>
  </div>
</header>

<main class="auth-wrap">
  <div class="auth-grid">
    <div class="auth-hero">
      <h2 style="font-family:var(--font-display);font-weight:800">Crie sua conta</h2>
      <p class="muted">Cadastre-se para gerenciar pedidos, salvar o carrinho e finalizar compras rapidamente.</p>
      <ul style="margin-top:1rem;list-style:none;padding-left:0">
        <li class="muted">✔️ Acesso rápido ao checkout</li>
        <li class="muted">✔️ Histórico de pedidos</li>
        <li class="muted">✔️ Endereço salvo</li>
      </ul>
    </div>

    <div class="auth-form">
      <form id="regForm">
        <input name="name" placeholder="Nome completo" required>
        <input name="email" type="email" placeholder="E-mail" required>
        <input name="password" type="password" placeholder="Senha" required>
        <input name="cpf" placeholder="CPF" required>
        <input name="address" placeholder="Endereço completo" required>
        <div style="display:flex;gap:.6rem;margin-top:.6rem;align-items:center">
          <button class="btn-primary" type="submit">Criar Conta</button>
          <a href="login.html" style="align-self:center;color:var(--g3)">Já tem conta?</a>
        </div>
        <div id="msg" style="color:#f66;margin-top:.6rem"></div>
      </form>
    </div>
  </div>
</main>

<!-- Footer (small) -->
<footer style="padding:2rem;text-align:center;color:var(--g3)">NEXUS • Curadoria de tecnologia premium</footer>

<script>
document.getElementById('regForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const f = e.target;
  const payload = {name:f.name.value.trim(), email:f.email.value.trim().toLowerCase(), password:f.password.value, cpf:f.cpf.value.trim(), address:f.address.value.trim()};
  const msg = document.getElementById('msg'); msg.textContent='';
  if(!payload.name||!payload.email||!payload.password){ msg.textContent='Preencha nome, e-mail e senha.'; return }
  try{
    const btn = f.querySelector('button'); btn.disabled = true; btn.textContent = 'Enviando...';
    const res = await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const json = await res.json();
    if(!res.ok){ msg.textContent = json.detail || json.error || 'Erro ao registrar'; btn.disabled=false; btn.textContent='Criar Conta'; return }
    // save tokens and user
    localStorage.setItem('access_token', json.access_token);
    localStorage.setItem('refresh_token', json.refresh_token);
    localStorage.setItem('user', JSON.stringify(json.user));
    // clear cart if needed and redirect
    const redirect = '/';
    window.location.href = redirect;
  }catch(err){ msg.textContent = 'Erro de rede'; }
});
</script>
<script>
// show user if already logged (same behavior as login page)
try{
  const user = JSON.parse(localStorage.getItem('user')||'null');
  const token = localStorage.getItem('access_token');
  const cta = document.querySelector('.cta-sm');
  if(user && token && cta){
    const wrap = document.createElement('div'); wrap.style.display='flex'; wrap.style.gap='0.6rem'; wrap.style.alignItems='center';
    const name = document.createElement('div'); name.textContent = user.name||'Minha conta'; name.style.fontWeight='600'; name.style.color='var(--w)';
    const logout = document.createElement('a'); logout.href='#'; logout.textContent='Sair'; logout.style.color='var(--g3)'; logout.style.textDecoration='none'; logout.addEventListener('click', async function(e){e.preventDefault(); try{ await fetch('/api/logout',{method:'POST',headers:{'Authorization':'Bearer '+localStorage.getItem('access_token')}});}catch(e){} localStorage.removeItem('access_token'); localStorage.removeItem('refresh_token'); localStorage.removeItem('user'); location.reload(); });
    wrap.appendChild(name); wrap.appendChild(logout);
    cta.replaceWith(wrap);
  }
}catch(e){/*ignore*/}
</script>
</body>
</html>
