<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Carrinho - NEXUS</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .container{max-width:980px;margin:3rem auto;padding:1rem}
    .cart-list{display:flex;flex-direction:column;gap:1rem}
    .cart-item{display:flex;gap:1rem;align-items:center;background:rgba(255,255,255,0.02);padding:1rem;border-radius:12px;border:1px solid rgba(255,255,255,0.03)}
    .cart-item img{width:80px;height:80px;object-fit:cover;border-radius:8px}
    .cart-item .meta{flex:1}
    .cart-empty{text-align:center;padding:3rem;color:var(--g3)}
    .btn{display:inline-block;padding:.6rem 1rem;border-radius:10px;background:linear-gradient(135deg,#7C3AED,#A855F7);color:#fff;text-decoration:none}
  </style>
</head>
<body>
<header style="padding:1rem;backdrop-filter:blur(8px);background:rgba(5,5,5,.7)"><a href="index.html">← Voltar à loja</a></header>
<main class="container">
  <h1 style="font-family: var(--font-display); font-weight: 800; margin-bottom: 2rem;">Seu <span style="background:linear-gradient(135deg,var(--v3),var(--v5));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Carrinho</span></h1>
  <div id="cart" class="cart-list"></div>
  <div id="summary" style="margin-top:1.5rem"></div>
</main>
<script>
  async function fetchProductsMap(){
    try{
      const res = await fetch('/api/products');
      if(!res.ok) return {};
      const data = await res.json();
      const map = {};
      (data.products||[]).forEach(p=>map[p.id]=p);
      return map;
    }catch(e){return {}}
  }

  async function loadCart(){
    const token = localStorage.getItem('access_token');
    if(!token) return [];
    try {
      const res = await fetch('/api/cart', { headers: {'Authorization': `Bearer ${token}`} });
      if(!res.ok) return [];
      const {items} = await res.json();
      return items;
    } catch(e) { return []; }
  }

  async function renderCart(){
    const cartEl = document.getElementById('cart');
    const summaryEl = document.getElementById('summary');
    const token = localStorage.getItem('access_token');
    if(!token) {
      cartEl.innerHTML = '<div class="cart-empty">Você precisa de login para ver o carrinho. <a href="login.html" style="color:var(--v3)">Entrar</a></div>';
      summaryEl.innerHTML='';
      return;
    }
    const cart = await loadCart();
    const products = await fetchProductsMap();
    cartEl.innerHTML = '';
    if(!cart.length){cartEl.innerHTML = '<div class="cart-empty">Seu carrinho está vazio.</div>'; summaryEl.innerHTML=''; return}
    let total = 0;
    cart.forEach(item=>{
      const p = products[item.product_id] || {name:'Produto desconhecido',price:0,image:'/static/images/products/default.svg'};
      const subtotal = (p.price||0) * (item.quantity||1);
      total += subtotal;
      const div = document.createElement('div'); div.className='cart-item';
      div.innerHTML = `
        <img src="${p.image||'/static/images/products/default.svg'}" alt="${p.name}">
        <div class="meta">
          <div style="font-weight:700">${p.name}</div>
          <div style="color:var(--g3)">R$ ${ (p.price||0).toFixed(2) } x ${item.quantity}</div>
        </div>
        <div>
          <button class="btn" data-id="${item.product_id}" data-action="remove">Remover</button>
        </div>
      `;
      cartEl.appendChild(div);
    });
    summaryEl.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center"><strong style="font-family:var(--font-display)">Total</strong><strong style="font-family:var(--font-display); font-size: 1.3rem;">R$ ${total.toFixed(2)}</strong>S</div><div style="margin-top:1rem"><a href="#" id="checkoutBtn" class="btn">Continuar para pagamento</a></div>`;

    // bind remove
    cartEl.querySelectorAll('[data-action="remove"]').forEach(btn=>{
      btn.addEventListener('click', async e=>{
        const id = btn.getAttribute('data-id');
        try {
          const res = await fetch(`/api/cart/${id}`, {
            method: 'DELETE',
            headers: {'Authorization': `Bearer ${token}`}
          });
          if(res.ok) renderCart();
        } catch(e) { alert('Erro ao remover item'); }
      })
    });

    document.getElementById('checkoutBtn').addEventListener('click', async e=>{
      e.preventDefault();
      const access = localStorage.getItem('access_token');
      const user = JSON.parse(localStorage.getItem('user')||'null');
      if(!access || !user){ if(confirm('Sessão expirada. Fazer login agora?')) location.href='login.html'; return }

      const cartItems = await loadCart();
      if(!cartItems.length) { alert('Carrinho vazio!'); return; }

      const items = cartItems.map(it=>({id:it.product_id, qty: it.quantity}));
      const payload = { items: items, customer: { name: user.name, email: user.email, cpf: user.cpf || '', address: user.address || '', zip: user.zip || '' }, payment: 'pix' };
      try{
        const res = await fetch('/api/orders',{method:'POST',headers:{'Content-Type':'application/json','Authorization': 'Bearer '+access},body:JSON.stringify(payload)});
        const json = await res.json();
        if(!res.ok){ alert('Erro ao criar pedido: '+(json.detail||json.error||'')); return }
        alert('Pedido criado! ID: '+ (json.order_id || json.id));
        window.location.href = '/';
      }catch(err){alert('Erro de rede ao enviar pedido')}
    });
  }

  renderCart();
</script>
</body>
</html>
